services:
  - type: web
    name: shopify-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SHOPIFY_STORE
        sync: false
      - key: SHOPIFY_ADMIN_TOKEN
        sync: false

  - type: web
    name: ai-backend
    runtime: node
    buildCommand: npm install
    startCommand: node ai_backend.js
    envVars:
      - key: SHOPIFY_BACKEND_URL
        sync: false
      - key: PHI3_BACKEND_URL
        sync: false

  - type: web
    name: python-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_API_KEY
        sync: false
